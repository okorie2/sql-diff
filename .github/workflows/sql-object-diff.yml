name: SQL Diff Report

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  pages: write
  id-token: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate SQL diff report
        run: python scripts/sql-diff/main.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

  deploy-pages:
    needs: build-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request.number;

            const reportUrl = `https://${owner}.github.io/${repo}/`;

            const body = `## SQL Migration Review

            Detailed report: ${reportUrl}`;

            github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr,
              body
            });